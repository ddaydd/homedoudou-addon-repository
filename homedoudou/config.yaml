name: "HomeDoudou"
description: "Bridge Arduino/Meteor vers Home Assistant avec ecran OLED"
version: "2.0.0"
slug: "homedoudou"
init: false
arch:
  - aarch64
  - armhf
  - armv7
startup: application
boot: auto
hassio_api: true
homeassistant_api: true
auth_api: true
hassio_role: manager
privileged:
  - SYS_RAWIO
devices:
  - /dev/spidev0.0
  - /dev/spidev0.1
  - /dev/gpiochip0
  - /dev/gpiomem
options:
  websocket_port: 8080
  http_port: 3000
  ddp_enabled: false
  ddp_endpoint: "wss://hard.homedoudou.fr/websocket"
  ddp_hard_id: ""
  oled_enabled: false
schema:
  websocket_port: port
  http_port: port
  ddp_enabled: bool
  ddp_endpoint: url
  ddp_hard_id: str
  oled_enabled: bool
ports:
  8080/tcp: 8080
  3000/tcp: 3000
ports_description:
  8080/tcp: "WebSocket Arduino"
  3000/tcp: "API REST / Dashboard"
